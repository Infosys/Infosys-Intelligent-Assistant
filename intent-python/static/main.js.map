module.exports = "<ng-container *ngIf='state'>\r\n    <h2 mat-dialog-title>More Info</h2>\r\n\r\n    <mat-dialog-content>\r\n        <div class=\"col-md-12\">\r\n            <table class='table table-striped table-bordered'>\r\n                <thead>\r\n                    <th *ngFor='let column of keys'> {{column}} </th>\r\n                </thead>\r\n                <tbody>\r\n                    <tr *ngFor='let doc of dataToDisplay'>\r\n                        <ng-container *ngFor='let column of keys'>\r\n                            <ng-container *ngFor='let item of doc | keyvalue'>\r\n                                <td *ngIf='item.key==column'> {{item.value}} </td>\r\n                            </ng-container>\r\n                        </ng-container>\r\n                    </tr>\r\n                </tbody>\r\n            </table>\r\n            <!-- <mat-form-field appearance='outline' *ngFor='let key of keys'>\r\n                <mat-label>{{key}}</mat-label>\r\n                <input matInput style=\"color: darkslategray;\" value=\"{{dataToDisplay[key]}}\" disabled='true'>\r\n            </mat-form-field> -->\r\n        </div>\r\n    </mat-dialog-content>\r\n    <mat-dialog-actions style='float: right;'>\r\n        <button mat-button mat-dialog-close>Close</button>\r\n    </mat-dialog-actions>\r\n</ng-container>\r\n<ng-container *ngIf='!state'>\r\n    <h4 mat-dialog-title>No Information Available!</h4>\r\n    <mat-dialog-actions style='float: right;'>\r\n        <button mat-button mat-dialog-close>Close</button>\r\n    </mat-dialog-actions>\r\n</ng-container>"
