module.exports = "<h2 mat-dialog-title>Additional Image Details </h2>\r\n<mat-form-field class=\"app_name\">\r\n        <mat-label>Enter Application Name</mat-label>\r\n        <input matInput [(ngModel)]=\"data.app_name\" placeholder=\"Application  name \" required>\r\n    </mat-form-field>\r\n<mat-form-field class=\"sub_app_name\">\r\n    <mat-label>Enter SubApplication Name</mat-label>\r\n    <input matInput [(ngModel)]=\"data.sub_appname\" placeholder=\"SubApplication  name \" required>\r\n</mat-form-field>\r\n<mat-form-field class=\"error_details\">\r\n    <mat-label>Enter Error Details</mat-label>\r\n    <input matInput [(ngModel)]=\"data.error_details\" placeholder=\" Error Says \" >\r\n</mat-form-field>\r\n<mat-form-field class=\"resolution_steps\">\r\n    <mat-label>Enter Resolution Steps </mat-label>\r\n    <input matInput [(ngModel)]=\"data.resolution_steps\" placeholder=\"Resolution to be followed \" >\r\n</mat-form-field>\r\n\r\n<!-- <div mat-dialog-actions>\r\n        <button mat-button (click)=\"onNoClick()\">Cancel</button>\r\n        <button mat-button [mat-dialog-close]=\"data\" cdkFocusInitial>Save</button>\r\n</div> -->\r\n\r\n"
