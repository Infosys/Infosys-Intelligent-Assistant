module.exports = "<div class=\"main-content\">\r\n  <div class=\"modal-content height-auto\">\r\n    <div class=\"modal-header\" style=\"background-color: rgb(75, 172, 198);\">\r\n      <h4 class=\"modal-title\" id=\"modal-basic-title font-weight-bold\">\r\n        Open Tickets</h4>\r\n      <button type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\r\n        <span aria-hidden=\"true\" style=\"color:white;\">&times;</span>\r\n      </button>\r\n    </div>\r\n    <div class=\"modal-body\">\r\n      <div class=\"container-fluid\">\r\n        <div class=\"row\">\r\n          <div class=\"col-md-12 pl-0\">            \r\n            <div class=\"card height-auto\">\r\n              <div class=\"table-wrapper-scroll-y height-auto\">\r\n                <!-- <table class=\"table table-striped table-hover table-bordered\"> -->\r\n                <table class=\"table table-bordered table-responsive-sm table-striped table-active text-center\">\r\n                  <thead class=\"card-header card-header-primary py-0\">\r\n                    <th>Tickets</th>\r\n                    <th class=\"th-description\">Description</th>\r\n                    <!-- <th>Resolution</th> -->\r\n                  </thead>\r\n                  <tbody>\r\n                    <tr *ngFor=\"let ticket of openTickets\">\r\n                      <td>\r\n                        <label style=\"color: black;font-size: 15px;\">{{ticket['number']}}</label>\r\n                      </td>\r\n                      <td class=\"cell expand-maximum-on-hover\">\r\n                        <label class=\"td-style\">{{ticket['description']}}</label>\r\n                      </td>\r\n                      <!-- <td (click)=\"displayResolutionWordCloud(ticket['number'],'ticket')\"> -->\r\n                      <!-- <td>\r\n                        <label class=\"th-description\" style=\"word-wrap: break-word;\">{{ticket['close_notes']}}</label>\r\n                      </td> -->\r\n                    </tr>\r\n                  </tbody>\r\n                </table>\r\n              </div>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </div>\r\n\r\n    </div>\r\n  </div>\r\n</div>"
