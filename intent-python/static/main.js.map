module.exports = "<h2 mat-dialog-title>Enter Image Details for Analysis </h2>\r\n<mat-form-field class=\"img_name\">\r\n    <mat-label>Enter Image Name</mat-label>\r\n    <input matInput [(ngModel)]=\"img_name\" placeholder=\"Image name \" required>\r\n</mat-form-field>\r\n<mat-form-field class=\"error_details\">\r\n    <mat-label>Enter Error Details</mat-label>\r\n    <input matInput [(ngModel)]=\"error_details\" placeholder=\" Error Says \" >\r\n</mat-form-field>\r\n\r\n<mat-form-field class=\"col_names\" *ngFor=\"let colName of columnNames\">\r\n    <mat-label>Enter {{colName}}</mat-label>\r\n    <input matInput [(ngModel)]=\"data_to_send[colName]\" placeholder=\"{{colName}}\"  >\r\n</mat-form-field>\r\n\r\n\r\n<!-- <mat-form-field class=\"app_name\">\r\n    <mat-label>Enter Application Name</mat-label>\r\n    <input matInput [(ngModel)]=\"app_name\" placeholder=\"Application name \" required>\r\n</mat-form-field>\r\n<mat-form-field class=\"sub_app_name\">\r\n<mat-label>Enter SubApplication Name</mat-label>\r\n<input matInput [(ngModel)]=\"sub_appname\" placeholder=\"SubApplication name \" required>\r\n</mat-form-field>\r\n\r\n\r\n<mat-form-field class=\"resolution_steps\">\r\n    <mat-label>Enter Resolution Steps </mat-label>\r\n    <input matInput [(ngModel)]=\"resolution_steps\" placeholder=\"Resolution to be followed \" >\r\n</mat-form-field> -->\r\n\r\n<div mat-dialog-actions>\r\n        <!-- <button mat-button (click)=\"onNoClick()\">Cancel</button> -->\r\n        <button type=\"button\" class=\"btn btn-outline-info\" (click)=\"uploadImage_and_Train()\">\r\n            <span class=\"ti-plus\"></span>\r\n            Save and Train\r\n        </button>\r\n\r\n\r\n        <!-- <button mat-button  cdkFocusInitial (click)='uploadImage_and_Train()'>Save and Train</button> -->\r\n</div>\r\n\r\n"
