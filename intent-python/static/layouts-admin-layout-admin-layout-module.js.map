module.exports = "<div id=\"algorithm\">\r\n    <div>\r\n        <p>\r\n            <b>Choose an algorithm for prediction!</b>\r\n        </p>\r\n        <!-- <button class=\"btn btn-primary btn-sm\" (click)=\"showAlgorithms()\" style=\"margin:5px;\">Show Algorithms</button> -->\r\n    </div>\r\n    <div>\r\n        <input type=\"radio\" id='current' name=\"optradio\" (click)=\"showAlgorithms()\"> <b>Current Computed</b>\r\n        <input type=\"radio\" id='lastApproved' name=\"optradio\" (click)=\"showAlgorithms()\"> <b>Last Approved</b> <br>\r\n    </div>\r\n    <br>\r\n    <div class=\"col-lg-6\" *ngIf=\"algorithmChosen\">\r\n        <!-- <table>\r\n            <algorithm-information [predictedFieldsInformation]=\"predictedFieldsInformation\" [algorithmsInformation]=\"algorithmsInformation\" [customerId]=\"customerId\"></algorithm-information>\r\n        </table> -->\r\n        <div class=\"grid-x grid-margin-x grid-button\">\r\n                <div class=\"small-3 cell\">\r\n                    <!-- <div class=\"col-xs-3\"> -->\r\n                    <div class=\"action-buttons float-center\">\r\n                        <button type=\"button\" class=\"btn btn-primary btn-sm\" (click)=\"approveAlgorithms()\" style=\"margin:5px;\">Approve</button>\r\n                    <!-- </div> -->\r\n                    <!-- <div class=\"col-xs-3\"> -->\r\n                        <button type=\"button\" class=\"btn btn-link btn-sm\" (click)=\"rejectAlgorithms()\" style=\"margin:5px;\">Reject</button>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n    </div>\r\n    <br>\r\n\r\n</div>"
