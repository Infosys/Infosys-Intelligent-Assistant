module.exports = "<div class=\"main-content pt-1 mt-1\">\r\n   \r\n  <div class=\"row\">\r\n    <div class=\"card   mb-1 pb-0\">\r\n      <div class=\"card-header card-header-primary\">\r\n          <h4 class=\"card-title\">Upload Shift Details File\r\n              <sup><i class=\"fa fa-info-circle\" matTooltip=\"Please select team and upload roaster file\"\r\n                      matTooltipPosition=\"above\"></i></sup></h4>\r\n         <!-- <p class=\"card-category\">Please fill the below details</p>-->\r\n      </div>\r\n      <div class=\"card-body\">\r\n          <div class=\"col-md-12 \">\r\n            <div class=\"row text-justify\">\r\n              <div class=\"col-md-7 pt-2 \">\r\n                  <input class=\"form-control btnChooseFileDesign\" type=\"file\" #roasterDetails\r\n                      placeholder=\"Upload file...\" required />\r\n              </div>\r\n              <div class=\"col-md-2\">\r\n                  <button class=\"btn btn-outline-primary \" type=\"button\" (click)=\"uploadMonthlyRoasterDetails()\">Upload</button>\r\n              </div>\r\n          </div>\r\n          </div>\r\n      </div>\r\n\r\n  </div>\r\n</div>\r\n\r\n<div *ngIf=\"loader\">\r\n  <app-loader></app-loader>\r\n</div>\r\n</div>\r\n"
