module.exports = "<!-- <div class=\"main-content\">\r\n    <div class=\"row\">\r\n        <div class=\"col-md-12\">\r\n            <div class=\"card mb-0 ml-0\">\r\n                <div class=\"card-header card-header-primary py-0\">\r\n                    <div class=\"row py-2\">\r\n                        <div class=\"col-md-4 \">\r\n                            <h4 class=\"card-title pt-2\">Scripts Configuration\r\n                                <sup>\r\n                                    <i class=\"fa fa-info-circle\" matTooltip=\"scripts configuration\"\r\n                                        matTooltipPosition=\"above\"></i>\r\n                                </sup>\r\n                            </h4>\r\n                        </div>\r\n                      \r\n                    </div>\r\n                </div>\r\n                <div class=\"card-body\">\r\n                    <div class=\"row mb-3\">\r\n                        <div class=\"col-md-12 pl-0\">\r\n                            <div class=\"text-right\" >\r\n                                <button type=\"button\" class=\"btn btn-outline-primary\" (click)=\"addElement()\"><i class=\"material-icons\">add</i>Add Script</button>\r\n                                <button type=\"button\" class=\"btn btn-outline-primary\" (click)=\"createScript()\"><i class=\"material-icons\">create</i>Create Script</button>\r\n                                \r\n                            </div>\r\n\r\n                            <mat-form-field>\r\n                                <input matInput (keyup)=\"applyFilter($event.target.value)\" placeholder=\"Filter\">\r\n                              </mat-form-field>\r\n                              \r\n                              <div class=\"mat-elevation-z8\">\r\n                                <mat-table #table [dataSource]=\"dataSource\" matSort>\r\n\r\n                                \r\n                                    \r\n                                  <ng-container matColumnDef=\"Selected\">\r\n                                        <mat-header-cell *matHeaderCellDef mat-sort-header>\r\n                                            <input type=\"checkbox\" [(ngModel)]=\"selectedAll\" (change)=\"selectAll()\">\r\n                                        </mat-header-cell>\r\n                                        <mat-cell *matCellDef=\"let row;\">\r\n                                            <span class=\"table-remove\">\r\n                                                <input type=\"checkbox\" [(ngModel)]=\"row['Selected']\" (change)=\"checkIfAllSelected()\">\r\n                                            </span>\r\n                                        </mat-cell>\r\n                                    </ng-container>\r\n                              \r\n\r\n                                  <ng-container matColumnDef=\"scriptName\">\r\n\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Script Name </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate >\r\n                                            <mat-label>Script Name</mat-label>\r\n                                            <mat-select ngDefaultControl  name=\"scriptName\" [(ngModel)]=\"row['scriptName']\" (click)=\"scriptNameSelect()\">\r\n                                                <mat-option  *ngFor=\"let item of scriptsList\" value=\"{{item}}\">{{ item }}</mat-option>\r\n                                            </mat-select>\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n                              \r\n\r\n                                  <ng-container matColumnDef=\"keyword\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Keywords </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate>\r\n                                            <mat-label>Keywords</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['keyword']\" required>\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n                              \r\n\r\n                                  <ng-container matColumnDef=\"source\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Source </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row; let id=index\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate >\r\n                                            <mat-label>Source</mat-label>\r\n                                            <mat-select ngDefaultControl  name=\"env\" (selectionChange)=\"sourceChange($event.value,id)\" [(ngModel)]=\"row['source']\">\r\n                                              <mat-option  *ngFor=\"let item of sources\" value=\"{{item}}\">{{ item }}</mat-option>\r\n                                            </mat-select>\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n                              \r\n\r\n                                  <ng-container matColumnDef=\"argument\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Arguments </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row; let id=index\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"disabledList[id]\">\r\n                                            <mat-label>Arguments</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['argument']\" required >\r\n                                        </mat-form-field>\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"!disabledList[id]\">\r\n                                            <mat-label>Arguments</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['argument']\" required disabled=\"disabled\">\r\n                                        </mat-form-field></mat-cell>\r\n                                  </ng-container>\r\n\r\n                                  <ng-container matColumnDef=\"runEnv\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header>Run Environment</mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row; let id=index\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate>\r\n                                            <mat-label>Run Environment</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['runEnv']\" required (ngModelChange)=\"runEnvironmentChange(row['runEnv'],id)\">\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n\r\n                                  <ng-container matColumnDef=\"username\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Username </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row; let id=index\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"accessList[id]\">\r\n                                            <mat-label>Username</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['username']\" required >\r\n                                        </mat-form-field>\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"!accessList[id]\">\r\n                                            <mat-label>Username</mat-label>\r\n                                            <input type=\"text\" matInput [(ngModel)]=\"row['username']\" required disabled=\"disabled\">\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n\r\n                                  <ng-container matColumnDef=\"password\">\r\n                                    <mat-header-cell *matHeaderCellDef mat-sort-header> Password </mat-header-cell>\r\n                                    <mat-cell *matCellDef=\"let row; let id=index\">\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"accessList[id]\">\r\n                                            <mat-label>Password</mat-label>\r\n                                            <input type=\"password\" matInput [(ngModel)]=\"row['password']\" required>\r\n                                        </mat-form-field>\r\n                                        <mat-form-field class=\"example-full-widmat-header-cell\" ngNativeValidate *ngIf=\"!accessList[id]\">\r\n                                            <mat-label>Password</mat-label>\r\n                                            <input type=\"password\" matInput [(ngModel)]=\"row['password']\" required disabled=\"disabled\">\r\n                                        </mat-form-field>\r\n                                    </mat-cell>\r\n                                  </ng-container>\r\n\r\n                                  <mat-header-row *matHeaderRowDef=\"displayedColumns\"></mat-header-row>\r\n                                  <mat-row *matRowDef=\"let row; columns: displayedColumns;\">\r\n                                  </mat-row>\r\n                                </mat-table>\r\n                              \r\n                                <mat-paginator [pageSizeOptions]=\"[5, 10, 25, 100]\"></mat-paginator>\r\n                              </div> \r\n                            <div class=\"text-right\">\r\n                                <button type=\"button\" class=\"btn btn-link \" (click)=\"Remove()\">Remove</button>\r\n                                <button type=\"button\" class=\"btn btn-primary \" (click)=\"save()\">Save</button>\r\n                            </div>\r\n                           \r\n                        </div>\r\n\r\n                    </div>\r\n                </div>\r\n            </div>\r\n        </div>\r\n    </div>\r\n\r\n\r\n</div>\r\n\r\n\r\n\r\n\r\n -->\r\n\r\n <div class=\"main-content mb-0\">\r\n    <div class=\"row\">\r\n        <div class=\"col-md-12\">\r\n            <div class=\"card mb-0\">\r\n                <div class=\"card-header card-header-primary\">\r\n                    <h4 class=\"card-title\">Micro-Bots</h4>\r\n\r\n                </div>\r\n                \r\n                <div class=\"card-body MinHeightStyle\">\r\n                    <div class=\"row mb-3\">\r\n                        <div class=\"col-md-12\">\r\n                            \r\n                                <mat-tab-group>\r\n                                    <mat-tab label=\"Micro-Bot Management\">\r\n                                        <app-script-management></app-script-management>\r\n                                    </mat-tab>\r\n\r\n                                    <mat-tab label=\"Micro-Bot Mapping\">\r\n                                        <app-scripts-mapping></app-scripts-mapping>\r\n                                    </mat-tab>\r\n                                    \r\n                                    <mat-tab label=\"Resolver Orchestration\">\r\n                                        <app-workflow></app-workflow>\r\n                                    </mat-tab>\r\n            \r\n\r\n                                    <mat-tab label=\"Micro-Bot Environments\">\r\n                                        <app-script-run></app-script-run>\r\n                                    </mat-tab>\r\n                                </mat-tab-group>\r\n                            \r\n                        </div>\r\n                    </div>\r\n                </div>\r\n            </div>\r\n        </div>\r\n    </div>\r\n</div>\r\n"
