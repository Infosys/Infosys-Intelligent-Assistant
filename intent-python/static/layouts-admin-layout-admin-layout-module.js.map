module.exports = "<div class=\"main-content\">\r\n  <div class=\"row\">\r\n    <div class=\"col-md-12\">\r\n      <div class=\"card\">\r\n        <div class=\"card-header card-header-primary\">\r\n          <h4 class=\"card-title\">Assignment Details\r\n          </h4>\r\n        </div>\r\n        <div class=\"card-body\">\r\n          <div class=\"row\">\r\n            <div class=\"col-md-12\">\r\n              <mat-tab-group #tabs (selectedTabChange)=\"tabChanged($event)\">\r\n                <mat-tab label=\"Manage Applications\">\r\n\r\n                  <app-application-details *ngIf=\"index==0\"></app-application-details>\r\n                </mat-tab>\r\n                <mat-tab label=\"Manage Resources\">\r\n                  <app-resource-details *ngIf=\"index==1\"></app-resource-details>\r\n                </mat-tab>\r\n                <mat-tab label=\"Manage Mapping\">\r\n                  <app-mapping-details *ngIf=\"index==2\"></app-mapping-details>\r\n                </mat-tab>\r\n                <mat-tab label=\"Manage Shifts\">\r\n                  <app-resourceShiftDetails-details *ngIf=\"index==3\"></app-resourceShiftDetails-details>\r\n                </mat-tab>\r\n               \r\n                <mat-tab label=\"Current Shifts \">\r\n                  <app-roaster-details *ngIf=\"index==4\"></app-roaster-details>\r\n                </mat-tab>\r\n                <mat-tab label=\"Ticket Weightage\">\r\n                  <app-ticket-weightage-details *ngIf=\"index==5\"></app-ticket-weightage-details>\r\n                </mat-tab> \r\n\r\n\r\n              </mat-tab-group>\r\n            </div>\r\n          </div>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n"
