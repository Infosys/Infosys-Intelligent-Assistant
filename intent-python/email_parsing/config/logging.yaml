version: 1
disable_existing_loggers: false

formatters:
  simpleFormatter:
    format: '%(asctime)s %(name)s %(lineno)d %(levelname)s %(message)s'
    datefmt: '%Y/%m/%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simpleFormatter
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: simpleFormatter
    filename:
    encoding: utf8
    mode: w

loggers:
  __main__:
    level: INFO
    handlers: [ file, console]
    propogate: no
  parse_email.utils.servicenow_helper:
    level: DEBUG
    handlers: [ file, console]
    propogate: no
  parse_email.parse_email:
    level: INFO
    handlers: [ file, console]
    propogate: no
  parse_email.utils.ner_helper:
    level: INFO
    handlers: [ file, console]
    propogate: no
  parse_email.utils.config_helper:
    level: INFO
    handlers: [ file, console]
    propogate: no
  parse_email.crypt.crypt:
    level: INFO
    handlers: [ file, console]
    propogate: no
  parse_email.utils.mongodb_helper:
    level: INFO
    handlers: [ file, console]
    propogate: no